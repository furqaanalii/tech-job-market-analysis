<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Job Market Intelligence | Furqaan Ali</title>

<!-- ─── REPLACE THESE WITH YOUR ADZUNA KEYS ─────────────────────────── -->
<script>
  const ADZUNA_APP_ID  = "YOUR_APP_ID";
  const ADZUNA_APP_KEY = "YOUR_APP_KEY";
</script>
<!-- ──────────────────────────────────────────────────────────────────── -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #05080f; --surface: #0d1424; --surface2: #121929;
  --border: #1e2d45; --accent: #3b82f6; --accent2: #60a5fa;
  --green: #10b981; --amber: #f59e0b; --text: #e2e8f0; --muted: #64748b;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.dashboard { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.header-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.header-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #fff; line-height: 1.1; }
.header-sub { font-size: 13px; color: var(--muted); margin-top: 5px; }
.live-badge { display: flex; align-items: center; gap: 7px; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); border-radius: 99px; padding: 5px 12px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--green); white-space: nowrap; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
.filter-btn.active { background: rgba(59,130,246,0.12); border-color: var(--accent); color: var(--accent2); }
.filter-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.stat-card.blue::before { background: var(--accent); }
.stat-card.green::before { background: var(--green); }
.stat-card.amber::before { background: var(--amber); }
.stat-card.purple::before { background: #818cf8; }
.stat-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; line-height: 1; }
.stat-meta { font-size: 11px; color: var(--muted); margin-top: 5px; }

.charts-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; margin-bottom: 14px; }
.charts-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.chart-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); width: 90px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.bar-val { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }

.salary-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.salary-label { font-size: 11px; color: var(--text); width: 130px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
.salary-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.salary-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.salary-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent2); width: 52px; text-align: right; flex-shrink: 0; }

.city-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.city-label { font-size: 11px; color: var(--text); width: 80px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
.city-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.city-fill { height: 100%; border-radius: 4px; transition: width 0.8s; }
.city-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green); width: 52px; text-align: right; flex-shrink: 0; }

.donut-wrap { display: flex; align-items: center; justify-content: center; gap: 24px; }
.donut-legend { display: flex; flex-direction: column; gap: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-text { font-size: 12px; color: var(--text); }
.legend-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-left: auto; padding-left: 16px; }

.loading { text-align: center; padding: 60px 20px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
.loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 16px; font-size: 13px; color: #fca5a5; margin: 20px 0; }

.footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.footer-right { display: flex; gap: 16px; }
.footer-link { font-size: 11px; color: var(--accent); font-family: 'DM Mono', monospace; text-decoration: none; letter-spacing: 0.06em; }

@media (max-width: 700px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .charts-grid, .charts-grid-2 { grid-template-columns: 1fr; }
  .header { flex-direction: column; gap: 12px; }
}
</style>
</head>
<body>
<div class="dashboard">

  <div class="header">
    <div class="header-left">
      <div class="header-eyebrow">LIVE ANALYSIS</div>
      <div class="header-title">Tech Job Market<br>Intelligence</div>
      <div class="header-sub">Real-time insights from active job postings · Built by Furqaan Ali</div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE DATA</div>
  </div>

  <div class="filters">
    <span class="filter-label">Role</span>
    <div class="filter-group">
      <button class="filter-btn active" onclick="loadRole('data analyst',this)">Data Analyst</button>
      <button class="filter-btn" onclick="loadRole('data scientist',this)">Data Scientist</button>
      <button class="filter-btn" onclick="loadRole('data engineer',this)">Data Engineer</button>
      <button class="filter-btn" onclick="loadRole('machine learning engineer',this)">ML Engineer</button>
      <button class="filter-btn" onclick="loadRole('business intelligence analyst',this)">BI Analyst</button>
    </div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      Fetching live job data...
    </div>
  </div>

  <div class="footer">
    <div class="footer-left" id="footer-ts">Loading...</div>
    <div class="footer-right">
      <a class="footer-link" href="https://github.com/furqaanalii/tech-job-market-analysis" target="_blank">GITHUB →</a>
      <a class="footer-link" href="https://linkedin.com/in/furqaanali091204" target="_blank">LINKEDIN →</a>
    </div>
  </div>

</div>

<script>
const SKILL_KEYWORDS = [
  "Python","SQL","Tableau","Excel","Power BI","AWS","Azure","pandas",
  "Spark","dbt","Looker","Airflow","Kafka","Scikit-learn","TensorFlow",
  "PyTorch","Docker","Kubernetes","NumPy","Git","Machine Learning","React",
  "Java","Scala","Hadoop","Snowflake","MLflow","Statistics","R Studio",
  "Power Automate","SharePoint","Jira","Linux","Bash","TypeScript"
];

const COLORS_BLUE  = ["#3b82f6","#60a5fa","#818cf8","#a78bfa","#6366f1","#38bdf8","#22d3ee","#93c5fd"];
const COLORS_GREEN = ["#10b981","#34d399","#6ee7b7","#a7f3d0","#059669","#10b981","#34d399","#6ee7b7"];

// Cache results so repeated filter clicks don't burn API calls
const cache = {};

let activeBtn = null;

async function loadRole(role, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (cache[role]) {
    render(role, cache[role]);
    document.getElementById('footer-ts').textContent =
      `Last updated: ${new Date().toLocaleString()} · ${cache[role].length} postings (cached)`;
    return;
  }

  document.getElementById('app').innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      Fetching live data for "${role}"...
    </div>`;

  try {
    const pages = await Promise.all([1,2,3].map(p =>
      fetch(`https://api.adzuna.com/v1/api/jobs/us/search/${p}?app_id=${ADZUNA_APP_ID}&app_key=${ADZUNA_APP_KEY}&what=${encodeURIComponent(role)}&results_per_page=50&content-type=application/json`)
        .then(r => r.json())
    ));

    const jobs = pages.flatMap(p => p.results || []);
    if (!jobs.length) throw new Error("No results returned. Check your API keys.");

    cache[role] = jobs;
    render(role, jobs);
    document.getElementById('footer-ts').textContent =
      `Last updated: ${new Date().toLocaleString()} · ${jobs.length} postings fetched`;

  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="error">
        ⚠️ Could not fetch data: ${err.message}<br>
        <small>Make sure your Adzuna APP_ID and APP_KEY are set at the top of this file.</small>
      </div>`;
  }
}

function extractSkills(jobs) {
  const counts = {};
  jobs.forEach(j => {
    const text = ((j.title || '') + ' ' + (j.description || '')).toLowerCase();
    SKILL_KEYWORDS.forEach(skill => {
      // Whole-word match only — prevents "R" matching inside words like "work", "for", "your"
      const escaped = skill.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp('\\b' + escaped + '\\b');
      if (pattern.test(text)) {
        counts[skill] = (counts[skill] || 0) + 1;
      }
    });
  });
  return Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .slice(0,8)
    .map(([name, count]) => ({ name, pct: +((count/jobs.length)*100).toFixed(1) }));
}

function extractSalaries(jobs) {
  // Filter out unrealistic values (below $20K or above $500K — likely data errors)
  const salaries = jobs
    .filter(j => j.salary_min && j.salary_max)
    .map(j => (j.salary_min + j.salary_max) / 2)
    .filter(s => s >= 20000 && s <= 500000);
  if (!salaries.length) return null;
  return Math.round(salaries.reduce((a,b)=>a+b,0) / salaries.length);
}

function extractCities(jobs) {
  const cityMap = {};
  jobs.forEach(j => {
    const loc = j.location?.display_name;
    if (!loc) return;
    const city = loc.split(',')[0].trim();
    if (!cityMap[city]) cityMap[city] = { total: 0, count: 0 };
    const sal = j.salary_min && j.salary_max ? (j.salary_min+j.salary_max)/2 : 0;
    if (sal >= 20000 && sal <= 500000) { cityMap[city].total += sal; cityMap[city].count++; }
  });
  return Object.entries(cityMap)
    .filter(([,v]) => v.count >= 1)
    .map(([city, v]) => ({ name: city, salary: Math.round(v.total/v.count/1000) }))
    .sort((a,b) => b.salary-a.salary)
    .slice(0,7);
}

function render(role, jobs) {
  const skills   = extractSkills(jobs);
  const avgSal   = extractSalaries(jobs);
  const cities   = extractCities(jobs);
  const remote = jobs.filter(j => {
    const t = ((j.title||'')+(j.description||'')).toLowerCase();
    return t.includes('remote') || t.includes('work from home') || t.includes('wfh') || t.includes('telecommute');
  }).length;
  const remotePct = ((remote/jobs.length)*100).toFixed(1);

  const maxSkill = Math.max(...skills.map(s=>s.pct));
  const maxCity  = cities.length ? Math.max(...cities.map(c=>c.salary)) : 1;

  document.getElementById('app').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label">Postings Analyzed</div>
        <div class="stat-value">${jobs.length.toLocaleString()}</div>
        <div class="stat-meta">live from Adzuna</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Avg Salary</div>
        <div class="stat-value">${avgSal ? '$'+Math.round(avgSal/1000)+'K' : 'N/A'}</div>
        <div class="stat-meta">from posted ranges</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Top Skill</div>
        <div class="stat-value" style="font-size:18px">${skills[0]?.name || '—'}</div>
        <div class="stat-meta">${skills[0]?.pct || 0}% of postings</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Mention Remote</div>
        <div class="stat-value">${remotePct}%</div>
        <div class="stat-meta">${remote} of ${jobs.length} postings</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Most In-Demand Skills</div>
        <div class="chart-sub">Extracted from job descriptions · ${role}</div>
        ${skills.map((s,i) => `
          <div class="bar-row">
            <div class="bar-label">${s.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(s.pct/maxSkill)*100}%;background:${COLORS_BLUE[i%8]}"></div></div>
            <div class="bar-val">${s.pct}%</div>
          </div>`).join('')}
      </div>
      <div class="chart-card">
        <div class="chart-title">Remote Mentions</div>
        <div class="chart-sub">Postings mentioning remote work</div>
        <div class="donut-wrap" style="margin-top:12px">
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="38" fill="none" stroke="#1e2d45" stroke-width="16"/>
            <circle cx="55" cy="55" r="38" fill="none" stroke="#3b82f6" stroke-width="16"
              stroke-dasharray="${(remote/jobs.length)*239} ${239-(remote/jobs.length)*239}"
              stroke-dashoffset="0" transform="rotate(-90 55 55)"/>
            <text x="55" y="51" text-anchor="middle" font-family="DM Mono" font-size="13" font-weight="500" fill="white">${remotePct}%</text>
            <text x="55" y="64" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#64748b">Remote</text>
          </svg>
          <div class="donut-legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:#3b82f6"></div>
              <span class="legend-text">Mentions remote</span>
              <span class="legend-pct">${remotePct}%</span>
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#1e2d45"></div>
              <span class="legend-text">No mention</span>
              <span class="legend-pct">${(100-parseFloat(remotePct)).toFixed(1)}%</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    ${cities.length ? `
    <div class="charts-grid-2">
      <div class="chart-card">
        <div class="chart-title">Avg Salary by City</div>
        <div class="chart-sub">From postings with salary data</div>
        ${cities.map((c,i) => `
          <div class="city-row">
            <div class="city-label">${c.name}</div>
            <div class="city-track"><div class="city-fill" style="width:${(c.salary/maxCity)*100}%;background:${COLORS_GREEN[i%8]}"></div></div>
            <div class="city-val">$${c.salary}K</div>
          </div>`).join('')}
      </div>
      <div class="chart-card">
        <div class="chart-title">Skill Demand Ranking</div>
        <div class="chart-sub">Top skills by posting frequency</div>
        ${skills.slice(0,6).map((s,i) => `
          <div class="salary-row">
            <div class="salary-label">${s.name}</div>
            <div class="salary-track"><div class="salary-fill" style="width:${(s.pct/maxSkill)*100}%;background:${COLORS_BLUE[i%8]}"></div></div>
            <div class="salary-val">${s.pct}%</div>
          </div>`).join('')}
      </div>
    </div>` : ''}
  `;
}

// Load on start
document.addEventListener('DOMContentLoaded', () => {
  loadRole('data analyst', document.querySelector('.filter-btn'));
});
</script>
</body>
</html>
